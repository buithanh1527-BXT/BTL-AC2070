<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
    <h1>Thư viện Online</h1>

    <div id="auth-links">
        <a href="/login">Đăng nhập</a>
        <a href="/register">Tạo tài khoản</a>
    </div>
</header>

    <div class="container">
        <h2>Danh sách Sách</h2>
        
        <div style="margin-bottom: 20px; display: flex; gap: 10px; justify-content: center;">
            <input type="text" id="search-input" placeholder="Tìm kiếm sách hoặc tác giả..." style="padding: 10px; width: 300px; border-radius: 4px; border: 1px solid #ccc;">
            <button class="btn btn-primary" onclick="searchBooks()">Tìm kiếm</button>
        </div>

        <div id="book-list" class="book-grid">
            <!-- Sách sẽ load ở đây -->
        </div>

        <div id="pagination" style="margin-top: 20px; text-align: center; display: flex; justify-content: center; gap: 10px;">
            <!-- Phân trang -->
        </div>
    </div>

    <div id="ad-popup" class="popup-overlay">
        <div class="popup-content">
            <h2>Khuyến mãi</h2>
            <p>Mượn 3 sách tặng 1 sách! Nhanh tay đăng ký.</p>
            <button class="btn btn-danger" onclick="closePopup()">Đóng</button>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
